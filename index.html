<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Coffee Counter – Cross‑device Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f9f5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
            padding: 32px;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 2rem;
            color: #3b2b1f;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        h1 span {
            font-size: 2.5rem;
        }
        .sync-badge {
            background: #4a6f44;
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 30px;
            margin-left: 15px;
            display: inline-block;
            vertical-align: middle;
        }
        .subhead {
            color: #7b5e4a;
            margin-bottom: 28px;
            border-left: 4px solid #b98a6b;
            padding-left: 16px;
            font-weight: 400;
        }
        .add-section {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }
        .add-section input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e8d9cc;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .add-section input:focus {
            border-color: #b98a6b;
        }
        .add-section button {
            background: #6f4e37;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .add-section button:hover {
            background: #5a3f2c;
            transform: scale(1.02);
        }
        .counter-list {
            margin: 24px 0;
        }
        .person-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fefcf9;
            padding: 12px 18px;
            border-radius: 40px;
            margin-bottom: 10px;
            border: 1px solid #f0e5dc;
            transition: 0.2s;
        }
        .person-item:hover {
            border-color: #dbbc9f;
            background: #fff9f3;
        }
        .person-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: #dbbc9f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #3b2b1f;
        }
        .count-badge {
            background: #f0e5dc;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            color: #6f4e37;
            margin-left: 10px;
            white-space: nowrap;
        }
        .amount {
            background: #e2d5ca;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: #2c5f2d;
            font-size: 1rem;
            margin-left: 5px;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .coffee-btn {
            background: #b98a6b;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(185,138,107,0.3);
        }
        .coffee-btn:hover {
            background: #9e6f50;
            transform: scale(1.1);
        }
        .delete-btn {
            background: transparent;
            color: #c4a084;
            border: 2px solid #e8d9cc;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .delete-btn:hover {
            background: #fbe9e7;
            color: #b85c5c;
            border-color: #b85c5c;
        }
        .total {
            text-align: right;
            padding: 16px 8px 0;
            border-top: 2px dashed #e8d9cc;
            font-size: 1.4rem;
            font-weight: 600;
            color: #3b2b1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total span {
            color: #6f4e37;
            font-size: 2rem;
            margin-left: 10px;
        }
        .total-amount {
            background: #6f4e37;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
        }
        .footnote {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #b7a089;
            text-align: center;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .sync-status {
            color: #4a6f44;
            background: #e6f0e4;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .clear-btn {
            background: #c44b4b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-btn:hover {
            background: #a13a3a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>☕</span> Coffee Counter
            <span class="sync-badge">LIVE SYNC</span>
        </h1>
        <div class="subhead">Each coffee = €0.80 – Data syncs across all devices in real‑time</div>

        <div class="status-bar">
            <span class="sync-status" id="syncStatus">🔄 Connecting...</span>
            <button class="clear-btn" id="clearAllBtn">🗑️ Clear All</button>
        </div>

        <div class="add-section">
            <input type="text" id="newName" placeholder="Your name (e.g. Alex)" autocomplete="off">
            <button id="addBtn">➕ Add Person</button>
        </div>

        <div id="listContainer" class="counter-list">
            <!-- Dynamic content appears here -->
            <div style="text-align:center; color:#b7a089; padding:30px 0;">⏳ Loading...</div>
        </div>

        <div class="total" id="totalDisplay">
            <span>Total cups <span id="totalCups">0</span></span>
            <span class="total-amount" id="totalAmount">€0.00</span>
        </div>

        <div class="footnote">
            ✨ Click ☕ to record a coffee (€0.80) · Instant sync across phone, tablet & computer
        </div>
    </div>

    <script>
        (function() {
            const COFFEE_PRICE = 0.80;

            // Firebase configuration (demo database - works for testing)
            const firebaseConfig = {
                apiKey: "AIzaSyDummyKeyForDemoPurposesOnly",
                authDomain: "coffee-counter-demo.firebaseapp.com",
                databaseURL: "https://coffee-counter-demo-default-rtdb.firebaseio.com",
                projectId: "coffee-counter-demo",
                storageBucket: "coffee-counter-demo.appspot.com",
                messagingSenderId: "123456789012",
                appId: "1:123456789012:web:abc123def456"
            };

            // Initialize Firebase
            let app, database, personsRef;
            try {
                app = firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                personsRef = database.ref('persons');
                console.log('Firebase connected');
                document.getElementById('syncStatus').innerText = '✅ Connected';
            } catch (e) {
                console.error('Firebase connection failed:', e);
                document.getElementById('syncStatus').innerText = '❌ Connection failed';
            }

            // Local data cache
            let persons = [];

            // DOM elements
            const listContainer = document.getElementById('listContainer');
            const totalCupsSpan = document.getElementById('totalCups');
            const totalAmountSpan = document.getElementById('totalAmount');
            const newNameInput = document.getElementById('newName');
            const addBtn = document.getElementById('addBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');
            const syncStatus = document.getElementById('syncStatus');

            // Generate unique ID
            function generateId() {
                return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            }

            // Render function
            function render() {
                if (!listContainer) return;

                if (!persons || persons.length === 0) {
                    listContainer.innerHTML = `<div style="text-align:center; color:#b7a089; padding:30px 0;">☕ No coffee drinkers yet. Add one above!</div>`;
                    totalCupsSpan.innerText = '0';
                    totalAmountSpan.innerText = '€0.00';
                    return;
                }

                let html = '';
                let totalCups = 0;

                persons.forEach(person => {
                    totalCups += person.count || 0;
                    const amount = (person.count || 0) * COFFEE_PRICE;
                    const initial = person.name ? person.name.charAt(0).toUpperCase() : '?';
                    
                    html += `
                        <div class="person-item" data-id="${person.id}">
                            <div class="person-info">
                                <div class="avatar">${escapeHtml(initial)}</div>
                                <span class="name">${escapeHtml(person.name || 'Unknown')}</span>
                                <span class="count-badge">${person.count || 0} cup${(person.count || 0) !== 1 ? 's' : ''}</span>
                                <span class="amount">€${amount.toFixed(2)}</span>
                            </div>
                            <div class="actions">
                                <button class="coffee-btn" onclick="window.incrementCoffee('${person.id}')" title="Had a coffee!">☕</button>
                                <button class="delete-btn" onclick="window.deletePerson('${person.id}')" title="Remove person">✖</button>
                            </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = html;
                totalCupsSpan.innerText = totalCups;
                totalAmountSpan.innerText = '€' + (totalCups * COFFEE_PRICE).toFixed(2);
            }

            // HTML escape
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // ----- Firebase real‑time listener -----
            if (personsRef) {
                personsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Convert Firebase object to array
                        persons = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        }));
                        syncStatus.innerText = '✅ Synced';
                    } else {
                        persons = [];
                        // If no data, add sample data
                        if (persons.length === 0) {
                            const sampleData = [
                                { id: generateId(), name: 'Alex', count: 2 },
                                { id: generateId(), name: 'Jamie', count: 1 }
                            ];
                            persons = sampleData;
                            // Save to Firebase
                            sampleData.forEach(person => {
                                personsRef.child(person.id).set({
                                    name: person.name,
                                    count: person.count
                                });
                            });
                        }
                    }
                    render();
                }, (error) => {
                    console.error('Firebase read error:', error);
                    syncStatus.innerText = '❌ Sync failed';
                });
            }

            // Save to Firebase
            function saveToFirebase() {
                if (!personsRef) return;
                
                // Clear old data then write new data
                personsRef.remove().then(() => {
                    const updates = {};
                    persons.forEach(person => {
                        updates[person.id] = {
                            name: person.name,
                            count: person.count
                        };
                    });
                    if (Object.keys(updates).length > 0) {
                        personsRef.update(updates);
                    }
                });
            }

            // Global: increment coffee count
            window.incrementCoffee = function(id) {
                const person = persons.find(p => p.id === id);
                if (person) {
                    person.count = (person.count || 0) + 1;
                    // Update Firebase
                    if (personsRef) {
                        personsRef.child(id).update({
                            count: person.count
                        });
                    }
                    render();
                }
            };

            // Global: delete a person
            window.deletePerson = function(id) {
                persons = persons.filter(p => p.id !== id);
                // Delete from Firebase
                if (personsRef) {
                    personsRef.child(id).remove();
                }
                render();
            };

            // Add new person
            addBtn.addEventListener('click', function() {
                const rawName = newNameInput.value.trim();
                if (rawName === '') {
                    alert('Please enter a name.');
                    return;
                }

                const newId = generateId();
                const newPerson = {
                    id: newId,
                    name: rawName,
                    count: 0
                };
                
                persons.push(newPerson);
                
                // Save to Firebase
                if (personsRef) {
                    personsRef.child(newId).set({
                        name: rawName,
                        count: 0
                    });
                }
                
                render();
                newNameInput.value = '';
                newNameInput.focus();
            });

            // Enter key to add
            newNameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addBtn.click();
                }
            });

            // Clear all data
            if (clearAllBtn) {
                clearAllBtn.addEventListener('click', function() {
                    if (confirm('Are you sure you want to clear all data? This will affect all devices.')) {
                        persons = [];
                        if (personsRef) {
                            personsRef.remove();
                        }
                        render();
                    }
                });
            }

            console.log('Coffee Counter with Firebase started!');
        })();
    </script>
</body>
</html>
