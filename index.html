<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Coffee Counter – 永久保存版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f9f5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
            padding: 32px;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 2rem;
            color: #3b2b1f;
            margin-bottom: 8px;
        }
        h1 span {
            font-size: 2.5rem;
        }
        .subhead {
            color: #7b5e4a;
            margin-bottom: 28px;
            border-left: 4px solid #b98a6b;
            padding-left: 16px;
            font-weight: 400;
        }
        .add-section {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }
        .add-section input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e8d9cc;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .add-section input:focus {
            border-color: #b98a6b;
        }
        .add-section button {
            background: #6f4e37;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .add-section button:hover {
            background: #5a3f2c;
            transform: scale(1.02);
        }
        .counter-list {
            margin: 24px 0;
        }
        .person-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fefcf9;
            padding: 12px 18px;
            border-radius: 40px;
            margin-bottom: 10px;
            border: 1px solid #f0e5dc;
            transition: 0.2s;
        }
        .person-item:hover {
            border-color: #dbbc9f;
            background: #fff9f3;
        }
        .person-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: #dbbc9f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #3b2b1f;
        }
        .count-badge {
            background: #f0e5dc;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            color: #6f4e37;
            margin-left: 10px;
            white-space: nowrap;
        }
        .amount {
            background: #e2d5ca;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: #2c5f2d;
            font-size: 1rem;
            margin-left: 5px;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .coffee-btn {
            background: #b98a6b;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(185,138,107,0.3);
        }
        .coffee-btn:hover {
            background: #9e6f50;
            transform: scale(1.1);
        }
        .delete-btn {
            background: transparent;
            color: #c4a084;
            border: 2px solid #e8d9cc;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .delete-btn:hover {
            background: #fbe9e7;
            color: #b85c5c;
            border-color: #b85c5c;
        }
        .total {
            text-align: right;
            padding: 16px 8px 0;
            border-top: 2px dashed #e8d9cc;
            font-size: 1.4rem;
            font-weight: 600;
            color: #3b2b1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total span {
            color: #6f4e37;
            font-size: 2rem;
            margin-left: 10px;
        }
        .total-amount {
            background: #6f4e37;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
        }
        .footnote {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #b7a089;
            text-align: center;
        }
        .clear-btn {
            background: #c44b4b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .clear-btn:hover {
            background: #a13a3a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>☕</span> Coffee Counter
        </h1>
        <div class="subhead">Each coffee = €0.80 – 数据会自动保存，刷新页面也不会丢失</div>

        <div class="add-section">
            <input type="text" id="newName" placeholder="Your name (e.g. Alex)" autocomplete="off">
            <button id="addBtn">➕ Add</button>
        </div>

        <div id="listContainer" class="counter-list">
            <!-- 动态内容会显示在这里 -->
        </div>

        <div class="total" id="totalDisplay">
            <span>Total cups <span id="totalCups">0</span></span>
            <span class="total-amount" id="totalAmount">€0.00</span>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <div class="footnote" style="margin-top: 0;">
                ✨ 点击 ☕ 记录一杯咖啡 (€0.80) · 数据自动保存
            </div>
            <button class="clear-btn" id="clearAllBtn">🗑️ 清除所有数据</button>
        </div>
    </div>

    <script>
        (function() {
            const COFFEE_PRICE = 0.80;

            // 生成唯一ID
            function generateId() {
                return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            }

            // 数据数组
            let persons = [];

            // ----- localStorage 操作函数 -----
            function saveToLocalStorage() {
                try {
                    localStorage.setItem('coffeePersons', JSON.stringify(persons));
                    console.log('数据已保存', persons); // 调试用
                } catch (e) {
                    console.error('保存失败', e);
                }
            }

            function loadFromLocalStorage() {
                try {
                    const saved = localStorage.getItem('coffeePersons');
                    if (saved) {
                        persons = JSON.parse(saved);
                        console.log('已加载保存的数据', persons); // 调试用
                    } else {
                        // 首次使用，添加示例数据
                        persons = [
                            { id: generateId(), name: 'Alex', count: 2 },
                            { id: generateId(), name: 'Jamie', count: 1 }
                        ];
                        console.log('首次使用，创建示例数据'); // 调试用
                    }
                } catch (e) {
                    console.error('加载失败', e);
                    persons = [];
                }
            }
            // --------------------------------

            // DOM 元素
            const listContainer = document.getElementById('listContainer');
            const totalCupsSpan = document.getElementById('totalCups');
            const totalAmountSpan = document.getElementById('totalAmount');
            const newNameInput = document.getElementById('newName');
            const addBtn = document.getElementById('addBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');

            // 渲染函数
            function render() {
                if (!listContainer) return;

                // 如果没有人，显示空状态
                if (!persons || persons.length === 0) {
                    listContainer.innerHTML = `<div style="text-align:center; color:#b7a089; padding:30px 0;">☕ No coffee drinkers yet. Add one above!</div>`;
                    totalCupsSpan.innerText = '0';
                    totalAmountSpan.innerText = '€0.00';
                    saveToLocalStorage(); // 保存空状态
                    return;
                }

                let html = '';
                let totalCups = 0;

                persons.forEach(person => {
                    // 确保每个person都有必要的属性
                    if (!person.count) person.count = 0;
                    if (!person.id) person.id = generateId();
                    
                    totalCups += person.count;
                    const amount = person.count * COFFEE_PRICE;
                    const initial = person.name ? person.name.charAt(0).toUpperCase() : '?';
                    
                    html += `
                        <div class="person-item" data-id="${person.id}">
                            <div class="person-info">
                                <div class="avatar">${escapeHtml(initial)}</div>
                                <span class="name">${escapeHtml(person.name || 'Unknown')}</span>
                                <span class="count-badge">${person.count} cup${person.count !== 1 ? 's' : ''}</span>
                                <span class="amount">€${amount.toFixed(2)}</span>
                            </div>
                            <div class="actions">
                                <button class="coffee-btn" onclick="window.incrementCoffee('${person.id}')" title="喝了一杯咖啡">☕</button>
                                <button class="delete-btn" onclick="window.deletePerson('${person.id}')" title="移除这个人">✖</button>
                            </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = html;
                totalCupsSpan.innerText = totalCups;
                totalAmountSpan.innerText = '€' + (totalCups * COFFEE_PRICE).toFixed(2);
                
                // 渲染完成后保存数据
                saveToLocalStorage();
            }

            // HTML转义（防止XSS）
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // 全局函数：增加咖啡计数
            window.incrementCoffee = function(id) {
                const person = persons.find(p => p.id === id);
                if (person) {
                    person.count = (person.count || 0) + 1;
                    render();
                }
            };

            // 全局函数：删除一个人
            window.deletePerson = function(id) {
                persons = persons.filter(p => p.id !== id);
                render();
            };

            // 添加新人
            addBtn.addEventListener('click', function() {
                const rawName = newNameInput.value.trim();
                if (rawName === '') {
                    alert('Please enter a name.');
                    return;
                }

                // 检查是否重名（可选）
                // if (persons.some(p => p.name.toLowerCase() === rawName.toLowerCase())) {
                //     alert('这个名字已经存在，请用不同的名字');
                //     return;
                // }

                const newPerson = {
                    id: generateId(),
                    name: rawName,
                    count: 0
                };
                persons.push(newPerson);
                render();
                newNameInput.value = '';
                newNameInput.focus();
            });

            // 回车键添加
            newNameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addBtn.click();
                }
            });

            // 清除所有数据按钮
            if (clearAllBtn) {
                clearAllBtn.addEventListener('click', function() {
                    if (confirm('确定要清除所有数据吗？')) {
                        persons = [];
                        render();
                    }
                });
            }

            // ----- 初始化：从localStorage加载数据 -----
            loadFromLocalStorage();
            render();
            
            // 在控制台打印帮助信息
            console.log('Coffee Counter 已启动！数据会自动保存。');
        })();
    </script>
</body>
</html>
